name: React AKS Pipeline

on:
  push:
    branches:
      - dev
      - staging
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to ACR
      run: |
        az acr login --name myreactdotnetacr

    - name: Build React Docker Image
      run: |
        docker build -t myreactdotnetacr.azurecr.io/react_repo:${{ github.sha }} .

    - name: Push React Docker Image
      run: |
        docker push myreactdotnetacr.azurecr.io/react_repo:${{ github.sha }}

    - name: Set AKS Context
      uses: azure/aks-set-context@v4
      with:
        resource-group: virtualmachine1
        cluster-name: myAKSCluster

    - name: Update React Deployment Image
      run: |
        kubectl set image deployment/react-deployment \
        react-container=myreactdotnetacr.azurecr.io/react_repo:${{ github.sha }}

    - name: Verify Deployment
      run: |
        kubectl rollout status deployment/react-deployment