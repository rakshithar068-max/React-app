apiVersion: apps/v1
kind: Deployment

metadata:
  name: react-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: react-app

  template:
    metadata:
      labels:
        app: react-app

    spec:
      containers:
      - name: react-container

        image: myreactdotnetacr.azurecr.io/react_repo:1.0

        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service

metadata:
  name: react-service

spec:
  type: LoadBalancer

  selector:
    app: react-app

  ports:
  - protocol: TCP
    port: 80
    targetPort: 80